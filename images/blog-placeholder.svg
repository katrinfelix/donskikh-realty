<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#6B0F0F"/>
  <!-- Decorative lines -->
  <line x1="0" y1="10" x2="800" y2="10" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <line x1="0" y1="490" x2="800" y2="490" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <!-- Book / article icon -->
  <g transform="translate(400,200)" opacity="0.35">
    <!-- Open book -->
    <path d="M-120,-80 L-120,80 L0,60 L120,80 L120,-80 L0,-60 Z" fill="none" stroke="white" stroke-width="8" stroke-linejoin="round"/>
    <line x1="0" y1="-60" x2="0" y2="60" stroke="white" stroke-width="8"/>
    <!-- Lines on left page -->
    <line x1="-95" y1="-30" x2="-20" y2="-38" stroke="white" stroke-width="5" stroke-linecap="round"/>
    <line x1="-95" y1="-10" x2="-20" y2="-18" stroke="white" stroke-width="5" stroke-linecap="round"/>
    <line x1="-95" y1="10" x2="-20" y2="2" stroke="white" stroke-width="5" stroke-linecap="round"/>
    <line x1="-95" y1="30" x2="-20" y2="22" stroke="white" stroke-width="5" stroke-linecap="round"/>
    <!-- Lines on right page -->
    <line x1="20" y1="-38" x2="95" y2="-30" stroke="white" stroke-width="5" stroke-linecap="round"/>
    <line x1="20" y1="-18" x2="95" y2="-10" stroke="white" stroke-width="5" stroke-linecap="round"/>
    <line x1="20" y1="2" x2="95" y2="10" stroke="white" stroke-width="5" stroke-linecap="round"/>
    <line x1="20" y1="22" x2="95" y2="30" stroke="white" stroke-width="5" stroke-linecap="round"/>
  </g>
  <!-- Accent line -->
  <rect x="340" y="330" width="120" height="4" fill="#FFD600" rx="2"/>
  <!-- Brand text -->
  <text x="400" y="375" font-family="Georgia, serif" font-size="14" fill="rgba(255,255,255,0.5)" text-anchor="middle" letter-spacing="4">БЛОГ</text>
  <text x="400" y="430" font-family="Georgia, serif" font-size="26" fill="white" text-anchor="middle" letter-spacing="4">АН ДОНСКИХ</text>
  <text x="400" y="460" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.6)" text-anchor="middle">Недвижимость · Нижний Новгород</text>
</svg>